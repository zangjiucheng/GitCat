name: Release

# Tag-push (v1.2.3) builds every platform/arch below and uploads the bundles
# to a (draft) GitHub Release matching the tag. workflow_dispatch runs the
# exact same matrix WITHOUT touching Releases at all — a manual "does the
# whole matrix still build" smoke test, e.g. after bumping a dependency,
# without needing to cut a real tag first.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# tauri-action creates/updates the GitHub Release and uploads assets to it —
# needs write access to Contents (releases are part of the Contents API).
permissions:
  contents: write

jobs:
  # Create the ONE draft release up front, before any platform builds — this
  # is the fix for the duplicate-draft bug. Previously every matrix leg ran
  # tauri-action with `tagName` + `releaseDraft: true`, so each leg
  # independently "find-or-create"d the release. GitHub's get-release-by-tag
  # API does not return drafts, so concurrent legs couldn't see the
  # in-progress draft and each created its OWN — leaving 2+ draft releases for
  # a single tag with the platform assets (and a partial latest.json apiece)
  # scattered across them. Creating the draft exactly once here, and having
  # every build leg upload into it BY ID, removes the race entirely.
  create-release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Find-or-create the draft release for this tag
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            // listReleases (authenticated, with contents:write) DOES include
            // drafts — unlike the get-by-tag endpoint tauri-action relied on —
            // so a re-run reuses the existing draft instead of stacking a new
            // one on top. Idempotent by design.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })
            let release = releases.find(r => r.tag_name === tag)
            if (release) {
              core.info(`Reusing existing release ${release.id} for ${tag}`)
            } else {
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `GitCat ${tag}`,
                body: "See the assets below for your platform's installer.",
                draft: true,
                prerelease: false,
              })
              release = data
              core.info(`Created draft release ${release.id} for ${tag}`)
            }
            return release.id

  build:
    name: ${{ matrix.name }}
    needs: create-release
    # Run after create-release on a tag push; also run on workflow_dispatch,
    # where create-release is skipped (its result is 'skipped', not 'failure').
    # The !cancelled() status function is what lets this job run despite a
    # skipped dependency; skip only if create-release genuinely FAILED — then
    # there's no release to upload into.
    if: ${{ !cancelled() && needs.create-release.result != 'failure' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      # One slow/flaky platform (e.g. a transient arm64 runner hiccup)
      # shouldn't cancel the other 5 — every platform reports its own real
      # pass/fail instead of a misleading blanket cancellation.
      fail-fast: false
      matrix:
        include:
          # macOS: build NATIVELY on both an Apple Silicon and an Intel
          # runner rather than cross-compiling a universal binary from one
          # host — this is Tauri's own documented reference pattern (avoids
          # any chance of subtle cross-toolchain quirks in git2's vendored
          # libgit2 C build) and produces two normal per-arch bundles instead
          # of one fat universal one, matching "matrix build" literally.
          - name: macOS (Apple Silicon / arm64)
            runner: macos-latest # GitHub's macos-latest is Apple Silicon (arm64) as of this writing
            target: aarch64-apple-darwin
          - name: macOS (Intel / x86_64)
            runner: macos-15-intel # the current Intel-hosted macOS image label (Intel runners are versioned separately from the Apple Silicon "macos-latest" line now)
            target: x86_64-apple-darwin

          # Linux: pin to 22.04 (NOT "ubuntu-latest") deliberately — a release
          # binary linked against a newer glibc/GTK than 22.04 ships raises the
          # MINIMUM OS version end users need, which is the opposite of what a
          # release build wants. 22.04-arm is a native arm64 runner (no GTK/
          # WebKit cross-compilation sysroot needed — same apt packages as x64,
          # just resolved for the native arch we're already running on).
          - name: Linux (x86_64)
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Linux (arm64)
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

          # Windows: both native now — GitHub added a hosted native arm64
          # Windows runner (windows-11-arm), so this avoids cross-compiling
          # (MSVC's arm64 cross-linker + a rustup cross target) entirely,
          # same reasoning as preferring native Linux/macOS arm64 runners above.
          - name: Windows (x86_64)
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Windows (arm64)
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Same rationale as ci.yml's rust job: tauri-runtime-wry links against
      # WebKitGTK/GTK/GLib at BUILD time on Linux, regardless of target arch —
      # see that file's longer comment for the full story. git2 itself needs
      # nothing extra here (vendored libgit2, ssh/https features disabled).
      - name: Install Linux system dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            xdg-utils

      # Must run before actions/setup-node's `cache: pnpm`, which shells out
      # to `pnpm store path` to locate what to cache (same as ci.yml).
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable toolchain (with this matrix entry's target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Keyed per-target (not just per-OS) so the six matrix entries never
      # share or clobber each other's incompatible target-triple artifacts —
      # matters most for the two Windows entries, which share a runner OS.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Manual smoke-test path (workflow_dispatch): build only, never touch
      # Releases. Confirms the whole matrix still compiles after a dependency
      # bump etc. without needing a throwaway tag.
      - name: Build (no release)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm tauri build --target ${{ matrix.target }}

      # Real release path (tag push): build AND upload every platform's
      # bundle into the ONE shared draft the create-release job made above,
      # addressed by id so no leg ever creates its own. Draft (not
      # published) on purpose — review the generated notes/assets and hit
      # "Publish" by hand once all 6 matrix entries have reported in. The
      # in-app updater (src/islands/updater) only sees a release once it's
      # published AND marked "latest" (not a pre-release) — its endpoint is
      # GitHub's stable `releases/latest/download/latest.json` URL, which
      # only resolves to a published, non-prerelease release. Publishing
      # this draft is therefore also what turns the update live for users.
      #
      # NOTE: this is TWO DIFFERENT KINDS OF "signing", not to be conflated:
      #   - Updater signing (TAURI_SIGNING_PRIVATE_KEY* below) — a minisign
      #     keypair (see tauri.conf.json's plugins.updater.pubkey) proving an
      #     update payload came from this pipeline and wasn't tampered with
      #     in transit. This alone is what's configured here.
      #   - OS-level code signing (Apple Developer ID / notarization, Windows
      #     Authenticode) — proving the BINARY's publisher identity to the
      #     OS. Still NOT configured (no such certificate secrets exist in
      #     this repo) — macOS Gatekeeper and Windows SmartScreen will both
      #     still warn on first launch of a fresh install. That's a separate
      #     follow-up; it does not block the updater from working for an
      #     already-installed app checking for its next update.
      - name: Build + publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the draft create-release already made, by id. With
          # releaseId set, tauri-action uploads this platform's bundle (and
          # merges its entry into the release's shared latest.json) into THAT
          # release instead of trying to create one — which is what used to
          # spawn duplicate drafts. No tagName/releaseName/releaseDraft here
          # on purpose: those are the create-mode inputs we're avoiding.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  # Runs ONCE after every matrix leg has uploaded its assets (not per-leg —
  # all 6 platforms share one release) to finish two things tauri-action
  # doesn't reliably handle on its own:
  finalize-release:
    name: Finalize release (prerelease flag + changelog notes)
    needs: [create-release, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # The release is now created by the create-release job with
      # prerelease:false, so the flag is reliable at the source. Historically
      # it was tauri-action that created the release, and its own
      # `prerelease: false` input did NOT reliably stick — every release
      # through v0.5.0 ended up prerelease=true on GitHub regardless, which
      # silently breaks the in-app updater: its endpoint
      # (releases/latest/download/latest.json) only ever resolves to a
      # published, NON-prerelease release. Keep force-correcting the flag here
      # anyway as a cheap belt-and-suspenders. The release stays a draft
      # (untouched by this step) for a human to review and publish by hand;
      # this only makes sure that once published, it's discoverable as an update.
      - name: gh release edit --prerelease=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --prerelease=false --repo ${{ github.repository }}

      # create-release seeds the draft body with one fixed, generic
      # sentence — fine as a placeholder, useless as an actual changelog.
      # Replace the draft's description with GitHub's own auto-generated
      # release notes (commits/PRs since the previous tag, same content
      # `gh release create --generate-notes` would produce — `gh release
      # edit` itself has no such flag, so the generate-notes API is called
      # directly) every time this workflow finishes, so the draft is always
      # ready to publish as-is without a human hand-writing notes first.
      - name: Regenerate the draft's release notes from commits since the last tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.ref_name }}" --jq .body > changelog.md
          {
            cat changelog.md
            echo
            echo "---"
            echo
            echo "See the assets below for your platform's installer."
          } > notes.md
          gh release edit "${{ github.ref_name }}" --notes-file notes.md --repo ${{ github.repository }}
