name: CI

on:
  # Only main gets its own push trigger — a feature branch with an open PR
  # already gets CI from `pull_request` below, so triggering `push` for every
  # branch double-runs the whole suite (once per event) on every commit to an
  # open PR. Restricting push to main is the standard fix: main itself is
  # never a PR head here, so it can't double-fire the other way either.
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Builds/tests the Rust core (src-tauri, crate `gitcat_lib`).
  # Independent of the `frontend` job below so the two run in parallel.
  rust:
    name: Rust (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Tauri itself (not just git2) needs system dev libraries on Linux: the
      # tauri-runtime-wry backend links against WebKitGTK/GTK/GLib at BUILD time
      # via gtk-sys/glib-sys/webkit2gtk-sys — this is required for `cargo build`
      # to even compile the `gitcat` binary, regardless of whether the app is
      # ever launched headlessly. (This was missing before and broke CI with
      # "The system library `glib-2.0` ... was not found" — glib-sys is a
      # transitive dep of gtk-sys/webkit2gtk-sys, neither of which are present
      # on a stock ubuntu-latest image.) Matches Tauri v2's documented Linux
      # prerequisites for Debian/Ubuntu.
      - name: Install Linux system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      # Caches the cargo registry/index and src-tauri/target, keyed on Cargo.lock.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # NOTE on native deps for git2/libgit2:
      # src-tauri/Cargo.toml pins `git2 = { version = "0.20", default-features = false }`.
      # git2's default features are ["ssh", "https"], which pull in libssh2-sys/openssl-sys
      # respectively — disabling them (as this repo does) means libgit2-sys builds with
      # NEITHER of those, so there is nothing for the runner to have OpenSSL/libssh2
      # dev headers for in the first place.
      # libgit2-sys's build.rs first tries to find a matching system libgit2 (>=1.9.4,
      # <1.10.0) via pkg-config; if that's not found (the normal case on a stock
      # `ubuntu-latest` image, which doesn't ship libgit2-dev) it falls back to compiling
      # the *vendored* libgit2 C sources bundled in the crate itself using the `cc` crate
      # directly (NOT the external `cmake` binary — libgit2-sys does not depend on
      # `cmake`). That vendored path only needs a C compiler and the `pkg-config` binary
      # (for the initial probe attempt), both of which `ubuntu-latest` ships preinstalled
      # (build-essential, pkg-config). This was verified locally against this repo's exact
      # Cargo.lock: the build takes the vendored path (`cargo:rustc-cfg=libgit2_vendored`)
      # with no extra system packages installed beyond the runner's stock image.
      # => No `apt-get install` step is needed here.

      - name: Build
        run: cargo build --locked

      - name: Install git-filter-repo (prep for the M5c filter-repo wizard's test suite; a no-op until that suite lands)
        run: |
          pipx install git-filter-repo
          git filter-repo --version

      - name: Test
        run: cargo test

      # tests/perf_graph.rs already ran once as part of the plain `cargo
      # test` above (Cargo auto-discovers every tests/*.rs file) — this
      # SEPARATE, redundant re-run exists purely for VISIBILITY: its own
      # named step in the Actions UI, and --nocapture so the actual timing
      # numbers land in the log even on success (skimmable over time to
      # notice a repo creeping slower well before it trips the — deliberately
      # generous — failure threshold). See perf_graph.rs's own doc comment
      # for why this exists at all: a WSL-specific version of this exact bug
      # class (a working-tree status scan stalling 185+ SECONDS on a repo
      # with a Linux symlink, reached over the \\wsl.localhost\ bridge —
      # see src/wsl.rs) shipped and went unnoticed until a real large repo
      # surfaced it manually; this is the general, CI-reliable, non-WSL
      # layer of protection against that whole bug CLASS recurring.
      # --test-threads=1 so the three tests' own eprintln! timing lines
      # print in a stable, non-interleaved order.
      #
      # The numbers themselves used to only be visible by opening this
      # step's raw log — easy to forget to check on a green run. Each test's
      # own `eprintln!("[perf] <name>: <elapsed> ...")` line is parsed out and
      # written as a markdown table to $GITHUB_STEP_SUMMARY instead, which
      # GitHub renders directly on the workflow run's summary page (no step
      # expansion needed). `set +e` around the pipe keeps the default
      # `bash -eo pipefail` from aborting the script before the summary gets
      # written on a FAILING run too — ${PIPESTATUS[0]} still captures cargo
      # test's real exit code, and the final `exit` still fails the job/step
      # exactly as before. Deliberately NOT `... | tee perf-output.log ||
      # true`: with pipefail active, running ANY command (even bare `true`)
      # after the pipe resets $PIPESTATUS to reflect THAT command instead —
      # verified locally that this silently turned every failure into a
      # falsely-reported status 0, which would have made this step always
      # "succeed" even on a real regression.
      #
      # `grep -o '\[perf\].*'` (not a line-anchored `^\[perf\]`) because
      # cargo test's own unbuffered "test <name> ... " progress text shares
      # the SAME line as each test's eprintln! (no newline between them until
      # "ok"/"FAILED" is appended) — verified against a real local run; a
      # `^`-anchored match found nothing since "[perf]" is never actually
      # first on its line.
      - name: Performance regression tests
        run: |
          set +e
          cargo test --test perf_graph -- --nocapture --test-threads=1 2>&1 | tee perf-output.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "### ⏱️ Performance regression tests"
            echo
            echo "| Check | Elapsed |"
            echo "| --- | --- |"
            grep -o '\[perf\].*' perf-output.log | while IFS= read -r line; do
              body=${line#"[perf] "}
              name=${body%%:*}
              rest=${body#*": "}
              echo "| \`$name\` | $rest |"
            done
            if [ "$status" -ne 0 ]; then
              echo
              echo "⚠️ A performance check **failed** — see this step's log for the exact assertion."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Build examples
        run: cargo build --examples --locked

  # Type-checks/builds/tests the Svelte 5 frontend.
  # Independent of the `rust` job above so the two run in parallel.
  frontend:
    name: Frontend (check + build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Must run before actions/setup-node's `cache: pnpm`, which shells out to
      # `pnpm store path` to locate what to cache.
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (svelte-check)
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Test (vitest)
        run: pnpm test
